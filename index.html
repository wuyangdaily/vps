<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 剩余价值</title>
    <link rel="preconnect" href="https://open.er-api.com" crossorigin>
    <link rel="dns-prefetch" href="https://open.er-api.com">
    <script>
        (() => {
            try {
                const savedTheme = localStorage.theme;
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.classList.toggle('dark', savedTheme === 'dark' || (!savedTheme && prefersDark));
            } catch (err) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        .app-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: grid;
            place-items: center;
            background: #f0f2f5;
            transition: opacity 120ms ease, visibility 120ms ease;
        }

        html.dark .app-loader {
            background: #17171c;
        }

        .app-loader.is-hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .app-loader__dot {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(100, 116, 139, 0.2);
            border-top-color: #f59e0b;
            border-radius: 9999px;
            animation: app-loader-spin 650ms linear infinite;
        }

        html.dark .app-loader__dot {
            border-color: rgba(212, 212, 216, 0.16);
            border-top-color: #fbbf24;
        }

        @keyframes app-loader-spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            .app-loader {
                transition: none;
            }

            .app-loader__dot {
                animation: none;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-3 md:p-4 text-slate-800 dark:text-zinc-300">

    <div id="appLoader" class="app-loader" role="status" aria-label="页面加载中">
        <span class="app-loader__dot" aria-hidden="true"></span>
    </div>

    <main id="captureRoot" class="w-full max-w-4xl relative">
        
        <div class="flex items-end justify-between mb-3 md:mb-4 px-1 md:px-2">
            <div class="flex items-center gap-3">
                <h1 class="text-xl md:text-3xl font-bold text-slate-600 dark:text-zinc-400 uppercase tracking-normal transition-colors flex items-center leading-none">
                    <!-- 图标修改为 🐔 -->
                    <span class="mr-2 text-2xl md:text-3xl leading-none">🐔</span>
                    <span>VPS 剩余价值</span>
                </h1>
            </div>
            
            <button id="themeToggle" type="button" aria-label="切换深色/浅色模式" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-300 dark:bg-zinc-700 transition-colors focus:outline-none shadow-inner" title="切换深色/浅色模式">

                    <!-- Sun Icon -->
                    <svg class="w-3 h-3 text-amber-500 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100 2h1a1 1 0 100-2h-1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
                </span>
            </button>
        </div>

        <div id="mainCard" class="relative rounded-xl overflow-hidden flex flex-col md:flex-row transition-all duration-300 shadow-xl dark:shadow-none metal-card-border metal-card-top-line bg-white dark:bg-[#26262b] border border-slate-200 dark:border-zinc-700">

                        </div>

                        <div class="w-[50%] group">

                                        <path fill-rule="evenodd" clip-rule="evenodd" d="M1.5 12C1.5 6.20101 6.20101 1.5 12 1.5C17.799 1.5 22.5 6.20101 22.5 12C22.5 17.799 17.799 22.5 12 22.5C6.20101 22.5 1.5 17.799 1.5 12ZM9.75 9.75C9.75 9.39934 9.93156 9.04321 10.3279 8.74936C10.7277 8.45299 11.3164 8.25 12 8.25C12.6836 8.25 13.2723 8.45299 13.6721 8.74936C14.0684 9.04321 14.25 9.39934 14.25 9.75C14.25 10.1642 14.5858 10.5 15 10.5C15.4142 10.5 15.75 10.1642 15.75 9.75C15.75 8.82566 15.2566 8.05679 14.5654 7.54439C14.059 7.16898 13.4315 6.91574 12.75 6.80828V6C12.75 5.58579 12.4142 5.25 12 5.25C11.5858 5.25 11.25 5.58579 11.25 6V6.80828C10.5685 6.91574 9.94095 7.16898 9.43458 7.54439C8.74344 8.05679 8.25 8.82566 8.25 9.75C8.25 10.6743 8.74344 11.4432 9.43458 11.9556C10.1223 12.4655 11.0336 12.75 12 12.75C12.6836 12.75 13.2723 12.953 13.6721 13.2494C14.0684 13.5432 14.25 13.8993 14.25 14.25C14.25 14.6007 14.0684 14.9568 13.6721 15.2506C13.2723 15.547 12.6836 15.75 12 15.75C11.3164 15.75 10.7277 15.547 10.3279 15.2506C9.93156 14.9568 9.75 14.6007 9.75 14.25C9.75 13.8358 9.41421 13.5 9 13.5C8.58579 13.5 8.25 13.8358 8.25 14.25C8.25 15.1743 8.74344 15.9432 9.43458 16.4556C9.94095 16.831 10.5685 17.0843 11.25 17.1917V18C11.25 18.4142 11.5858 18.75 12 18.75C12.4142 18.75 12.75 18.4142 12.75 18V17.1917C13.4315 17.0843 14.059 16.831 14.5654 16.4556C15.2566 15.9432 15.75 15.1743 15.75 14.25C15.75 13.3257 15.2566 12.5568 14.5654 12.0444C13.8777 11.5345 12.9664 11.25 12 11.25C11.3164 11.25 10.7277 11.047 10.3279 10.7506C9.93156 10.4568 9.75 10.1007 9.75 9.75Z"/>
                                    </svg>
                                    币种
                                </label>
                            </div>
                            <div class="relative">
                                <select id="currency" 
                                    class="select-centered w-full h-10 md:h-12 pl-3 md:pl-4 pr-8 rounded text-sm md:text-base font-medium cursor-pointer appearance-none transition-all outline-none bg-white border border-slate-300 text-slate-800 focus:border-amber-500 dark:bg-[#1d1d22] dark:border-zinc-700 dark:text-zinc-200 dark:focus:border-zinc-500">
                                    <option value="CNY">CNY 人民币</option>
                                    <option value="USD" selected>USD 美元</option>
                                    <option value="EUR">EUR 欧元</option>
                                    <option value="GBP">GBP 英镑</option>
                                    <option value="JPY">JPY 日元</option>
                                    <option value="KRW">KRW 韩元</option>
                                    <option value="AUD">AUD 澳元</option>
                                    <option value="HKD">HKD 港元</option>
                                    <option value="TWD">TWD 新台币</option>
                                    <option value="CAD">CAD 加拿大元</option>

                    </div>

                    <fieldset class="m-0 min-w-0 border-0 p-0">
                        <legend class="text-[10px] md:text-xs text-slate-500 dark:text-zinc-500 uppercase font-bold mb-1 md:mb-2 flex items-center gap-1 transition-colors">
                            <svg class="field-icon icon-cycle w-3.5 h-3.5 shrink-0" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">

                    <div class="flex flex-row gap-3 md:gap-6">
                        <div class="w-1/2 min-w-0 group">
                            <label for="dueDate" class="text-[10px] md:text-xs text-slate-500 dark:text-zinc-500 uppercase font-bold mb-1 md:mb-2 flex items-center gap-1 group-focus-within:text-amber-500 transition-colors">
                                <svg class="field-icon icon-due-date w-3.5 h-3.5 shrink-0" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
                                    <path d="M60,4H48c0-2.211-1.789-4-4-4s-4,1.789-4,4H24c0-2.211-1.789-4-4-4s-4,1.789-4,4H4C1.789,4,0,5.789,0,8v52c0,2.211,1.789,4,4,4h56c2.211,0,4-1.789,4-4V8C64,5.789,62.211,4,60,4z M8,12h8c0,2.211,1.789,4,4,4s4-1.789,4-4h16c0,2.211,1.789,4,4,4s4-1.789,4-4h8v8H8V12z"/>

                                <span class="date-display-value text-xs md:text-sm font-medium tabular-nums" aria-hidden="true"></span>
                                <span class="date-input-ff-mask" aria-hidden="true"></span>
                                <span class="date-input-icon absolute right-3 md:right-4 top-1/2 -translate-y-1/2 flex items-center justify-center text-slate-500 dark:text-zinc-500 cursor-pointer" style="opacity:0.85" aria-hidden="true">
                                    <svg class="h-[15px] w-[15px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                                    </svg>
                                </span>
                            </div>
                        </div>
                        <div class="w-1/2 min-w-0 group">
                            <label for="tradeDate" class="text-[10px] md:text-xs text-slate-500 dark:text-zinc-500 uppercase font-bold mb-1 md:mb-2 flex items-center gap-1 group-focus-within:text-amber-500 transition-colors">
                                <svg class="field-icon icon-trade-date w-3.5 h-3.5 shrink-0" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">

                            <div class="relative date-input-wrapper">

                                <span class="date-display-value text-xs md:text-sm font-medium tabular-nums" aria-hidden="true"></span>
                                <span class="date-input-ff-mask" aria-hidden="true"></span>
                                <span class="date-input-icon absolute right-3 md:right-4 top-1/2 -translate-y-1/2 flex items-center justify-center text-slate-500 dark:text-zinc-500 cursor-pointer" style="opacity:0.85" aria-hidden="true">
                                    <svg class="h-[15px] w-[15px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 2v4m8-4v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"></path>

                    </div>

                    <div class="flex items-center justify-between gap-2 pt-3 md:pt-5 border-t border-slate-200 dark:border-zinc-800 transition-colors">
                        <div class="flex items-center gap-2 md:gap-2.5 min-w-0">
                            <label for="customRate" class="text-[10px] md:text-xs text-slate-500 dark:text-zinc-500 font-bold uppercase transition-colors flex items-center gap-1 whitespace-nowrap shrink-0">
                                <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">

                                    <path d="M14 7h7v7" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                CNY 汇率
                            </label>
                            <input type="number" id="customRate" step="0.0001" class="w-16 md:w-20 lg:w-24 text-sm md:text-base font-bold tabular-nums text-center border-b outline-none py-1 transition-colors bg-transparent border-slate-400 text-amber-600 focus:border-amber-500 dark:border-zinc-600 dark:text-amber-500 dark:focus:border-amber-500 shrink-0" placeholder="0.00">
                        </div>
                        
                        <div class="flex items-center gap-2 md:gap-2.5 relative shrink-0">
                            <div id="rateLimitTip" role="alert" class="rate-limit-tip bg-amber-500 text-white text-[11px] px-2.5 py-1 rounded shadow-md leading-none pointer-events-none whitespace-nowrap">

            <!-- 右侧：结果展示，移动端 padding 改为 p-3 (12px) -->

                <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-slate-100/50 dark:from-zinc-800/20 via-transparent to-transparent opacity-50 pointer-events-none transition-colors"></div>

                <!-- 增加 px-1 (4px) 左右间隙 -->
                <div class="result-summary relative z-10 w-full min-w-0 flex-1 flex flex-col justify-start md:justify-center px-0.5 md:px-1">
                    <div class="result-value-panel text-right mb-2 md:mb-3 min-w-0">
                        <h2 class="text-[10px] md:text-xs text-slate-500/90 dark:text-zinc-500 uppercase tracking-normal font-bold mb-1 transition-colors flex items-center justify-end gap-1">
                            <svg class="field-icon icon-value w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M3 3h18a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm10 10v-1h3v-2h-2.586l2.122-2.121-1.415-1.415L12 8.586 9.879 6.464 8.464 7.88 10.586 10H8v2h3v1H8v2h3v2h2v-2h3v-2h-3z"/>
                            </svg>
                            剩余价值 (RMB)
                        </h2>
                        <div class="result-amount-row flex min-w-0 items-baseline justify-end gap-0.5 md:gap-1">
                            <span class="text-2xl md:text-3xl text-slate-500 dark:text-zinc-600 font-light transition-colors">¥</span>
                            <span id="finalValue" role="button" tabindex="0" title="点击复制金额" aria-label="点击复制金额" class="max-w-full text-[clamp(2rem,calc(8.6vw+4px),2.5rem)] md:text-[68px] font-bold tabular-nums value-glow tracking-normal leading-none transition-colors whitespace-nowrap cursor-pointer rounded-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/30">0.00</span>
                        </div>
                        <div class="amount-copy-row mt-1 flex items-center justify-end gap-5 leading-none min-w-0">
                            <span id="amountCopyTip" class="amount-copy-tip shrink-0 rounded bg-amber-500 px-2.5 py-1 text-[11px] leading-none text-white shadow-md pointer-events-none">金额已复制</span>
                            <div id="originalCurrencyValue" class="text-[12px] text-slate-500/90 dark:text-zinc-500 font-bold uppercase leading-none transition-colors whitespace-nowrap">≈0.00 USD</div>
                        </div>
                    </div>

                    <div class="result-divider w-full h-px bg-slate-200/60 dark:bg-zinc-800/50 my-2.5 md:my-3.5 transition-colors"></div>

                    <div class="result-days-panel">
                        <div class="days-progress-row flex items-center gap-2 md:gap-2.5">
                            <div class="text-[10px] md:text-xs text-slate-500/90 dark:text-zinc-500 font-bold uppercase transition-colors flex items-center gap-1 shrink-0">
                                <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M7 3h10v1.5c0 2.5-2 4-5 5.5-3-1.5-5-3-5-5.5V3z" fill="#f59e0b"/>
                                    <path d="M7 21h10v-1.5c0-2.5-2-4-5-5.5-3 1.5-5 3-5 5.5V21z" fill="#3b82f6"/>
                                    <rect x="6" y="2.2" width="12" height="1.3" rx="0.6" fill="#78716c"/>
                                    <rect x="6" y="20.5" width="12" height="1.3" rx="0.6" fill="#78716c"/>
                                    <path d="M12 10.5c-1.2-.7-2.5-1.6-3.3-2.7h6.6C14.5 8.9 13.2 9.8 12 10.5z" fill="#fcd34d" opacity=".7"/>
                                </svg>
                                剩余天数
                            </div>
                            <div class="days-count-line whitespace-nowrap text-xs md:text-sm font-semibold tabular-nums text-slate-500/90 dark:text-zinc-400 leading-none transition-colors shrink-0">
                                <span id="daysRemaining" class="opacity-80">0</span><span class="text-[10px] text-slate-400/90 dark:text-zinc-500 font-bold uppercase leading-none transition-colors whitespace-nowrap ml-1">DAYS</span>
                            </div>
                            <div class="flex-1 progress-container h-1.5 rounded-full overflow-hidden transition-colors bg-slate-200 dark:bg-zinc-800">
                                <div id="progressBar" class="progress-fill h-full w-0 transition-all duration-700 ease-out rounded-full"></div>
                            </div>
                            <div id="progressText" class="text-[10px] md:text-xs font-bold uppercase leading-none transition-colors whitespace-nowrap text-amber-500 shrink-0 md:self-end">0%</div>
                        </div>
                    </div>

                    <div class="result-divider quote-divider w-full h-px bg-slate-200/60 dark:bg-zinc-800/50 my-2.5 md:my-3.5 transition-colors"></div>

                    <div class="quote-panel w-full grid grid-cols-2 gap-4 md:gap-5 min-w-0">
                        <div class="quote-field group min-w-0 flex items-center gap-2">
                            <label for="premiumInput" class="quote-label text-[10px] md:text-xs text-slate-500/90 dark:text-zinc-500 font-bold uppercase leading-none flex items-center gap-1 transition-colors group-focus-within:text-amber-500 shrink-0">
                                <svg class="quote-icon premium-icon w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
                                </svg>
                                溢价
                            </label>
                            <div class="quote-input-wrap relative flex-1 min-w-0">
                                <span class="quote-prefix absolute left-2 top-1/2 -translate-y-1/2 text-[11px] font-bold text-slate-400 dark:text-zinc-600 pointer-events-none transition-colors">¥</span>
                                <input type="number" id="premiumInput" step="0.01" class="quote-input quote-premium-input w-full h-7 md:h-8 pl-5 pr-2 rounded border text-xs md:text-sm font-bold tabular-nums text-right outline-none transition-all bg-slate-50/80 border-slate-200 text-emerald-600 focus:bg-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500/20 dark:bg-zinc-800/40 dark:border-zinc-700 dark:text-emerald-400 dark:focus:bg-zinc-800 dark:focus:border-zinc-500 dark:focus:ring-0" placeholder="0.00" inputmode="decimal">
                            </div>
                        </div>
                        <div class="quote-field group min-w-0 flex items-center gap-2">
                            <label for="salePriceInput" class="quote-label text-[10px] md:text-xs text-slate-500/90 dark:text-zinc-500 font-bold uppercase leading-none flex items-center gap-1 transition-colors group-focus-within:text-amber-500 shrink-0">
                                <svg class="quote-icon sale-icon w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M6 7h12M8 12h8M10 17h4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                                </svg>
                                售价
                            </label>
                            <div class="quote-input-wrap relative flex-1 min-w-0">
                                <span class="quote-prefix absolute left-2 top-1/2 -translate-y-1/2 text-[11px] font-bold text-slate-400 dark:text-zinc-600 pointer-events-none transition-colors">¥</span>
                                <input type="number" id="salePriceInput" step="0.01" class="quote-input quote-sale-input w-full h-7 md:h-8 pl-5 pr-2 rounded border text-xs md:text-sm font-bold tabular-nums text-right outline-none transition-all bg-slate-50/80 border-slate-200 text-violet-700 focus:bg-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500/20 dark:bg-zinc-800/40 dark:border-zinc-700 dark:text-violet-300 dark:focus:bg-zinc-800 dark:focus:border-zinc-500 dark:focus:ring-0" placeholder="0.00" inputmode="decimal">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="btnContainer" class="action-bar relative z-10 mt-2 md:mt-auto mx-0.5 md:mx-1 flex items-center rounded-lg border border-slate-200 bg-slate-50/80 p-0.5 dark:border-zinc-800 dark:bg-zinc-900/30">
                    <button type="button" id="copyBtn" title="复制MD格式详情" class="action-btn action-btn-copy h-7 flex-1 px-2 transition-all flex items-center justify-center gap-1.5 group rounded-md text-slate-500 hover:text-slate-800 hover:bg-white dark:text-zinc-500 dark:hover:text-zinc-200 dark:hover:bg-zinc-800/80 text-[11px] md:text-xs font-medium">
                        <!-- Copy Icon (SVG) -->
                        <svg class="w-3.5 h-3.5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <span>复制文本</span>
                    </button>
                    <div class="action-separator h-4 w-px bg-slate-200 dark:bg-zinc-800"></div>
                    <button type="button" id="imgBtn" title="生成分享图片" class="action-btn action-btn-image h-7 flex-1 px-2 transition-all flex items-center justify-center gap-1.5 group rounded-md text-slate-500 hover:text-slate-800 hover:bg-white dark:text-zinc-500 dark:hover:text-zinc-200 dark:hover:bg-zinc-800/80 text-[11px] md:text-xs font-medium">
                        <!-- Image Icon (SVG) -->
                        <svg class="w-3.5 h-3.5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span>生成图片</span>
                    </button>
                </div>
                
                <div id="toast" class="absolute bottom-16 left-1/2 -translate-x-1/2 bg-amber-500 text-white dark:text-black text-xs font-bold px-3 py-1.5 rounded shadow-lg pointer-events-none z-20 transition-colors">已复制到剪贴板</div>
            </section>
        </div>

    </main>

    <div id="imageModal" role="dialog" aria-modal="true" aria-label="生成的分享图片" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 transition-all duration-300 opacity-0">
        <div class="relative w-full max-w-4xl flex flex-col items-center">
            <button type="button" id="closeImageModalBtn" aria-label="关闭预览" class="absolute -top-12 right-0 text-white hover:text-amber-500 transition-colors text-2xl p-2">
                <!-- X Icon -->
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div id="modalLoading" class="text-white flex flex-col items-center gap-3">
                <!-- Spinner Icon -->
                <svg class="animate-spin h-8 w-8 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span class="text-sm font-medium">生成中...</span>
            </div>

            <img id="generatedImage" class="w-full h-auto rounded-xl shadow-2xl hidden" alt="Result Preview">
            
            <div id="modalActions" class="mt-6 flex items-center justify-center hidden">
                <p class="text-white/60 text-xs md:text-sm font-medium flex items-center">
                    <!-- Info Icon -->
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    长按或右键保存 WebP
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
